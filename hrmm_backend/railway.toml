startCommand = "python manage.py collectstatic --noinput && python -c \"import os,time,subprocess,sys; attempts=int(os.getenv('DB_MIGRATE_RETRIES','20')); delay=int(os.getenv('DB_MIGRATE_DELAY','6')); cmd=['python','manage.py','migrate'];\nfor i in range(attempts):\n r=subprocess.run(cmd);\n if r.returncode==0: break;\n print(f'[startup] migrate failed ({i+1}/{attempts}), retrying in {delay}s...'); time.sleep(delay)\nelse: sys.exit(1)\" && python manage.py shell -c \"from django.contrib.auth import get_user_model; from apps.users.models import User as AppUser; Admin=get_user_model(); Admin.objects.filter(username='admin').exists() or Admin.objects.create_superuser('admin','admin@example.com','admin123'); AppUser.objects.filter(username='admin').exists() or AppUser.objects.create(username='admin', email='admin@example.com', full_name='System Admin', password_hash='admin123', role='DIRECTOR', is_active=True)\" && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120"

