[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate && python manage.py shell -c \"from django.contrib.auth import get_user_model; U=get_user_model(); U.objects.filter(username='admin').exists() or U.objects.create_superuser('admin','admin@gmail.com','Admin123!')\" && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"