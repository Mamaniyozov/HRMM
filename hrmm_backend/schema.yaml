openapi: 3.0.3
info:
  title: HRMM API
  version: 1.0.0
  description: Hierarchical Report Management Module backend API
paths:
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - ht
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/audit/:
    get:
      operationId: v1_audit_retrieve
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/auth/refresh/:
    post:
      operationId: v1_auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/dashboard/stats/:
    get:
      operationId: v1_dashboard_stats_retrieve
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/departments/:
    get:
      operationId: v1_departments_retrieve
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/leaves/:
    get:
      operationId: v1_leaves_retrieve
      tags:
      - v1
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_leaves_create
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/leaves/{leave_id}/:
    get:
      operationId: v1_leaves_retrieve_2
      parameters:
      - in: path
        name: leave_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/leaves/{leaveId}/review/:
    post:
      summary: Leave review action (approve/reject)
      tags: [Leaves]
      parameters:
        - in: path
          name: leaveId
          schema:
            type: string
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                action: { type: string, enum: [APPROVE, REJECT] }
                review_comment: { type: string }
      responses:
        200:
          description: Review submitted
  /api/v1/leaves/{leaveId}/archive/:
    post:
      summary: Archive leave after rating
      tags: [Leaves]
      parameters:
        - in: path
          name: leaveId
          schema:
            type: string
          required: true
      responses:
        200:
          description: Leave archived

  /api/v1/reports/{reportId}/archive/:
    post:
      summary: Archive report after rating
      tags: [Reports]
      parameters:
        - in: path
          name: reportId
          schema:
            type: string
          required: true
      responses:
        200:
          description: Report archived

  /api/v1/ratings/:
    post:
      summary: Submit rating for approved item
      tags: [Ratings]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                item_id: { type: string }
                item_type: { type: string, enum: [leave, report] }
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string }
                approver_id: { type: string }
              required: [item_id, item_type, rating, approver_id]
      responses:
        201:
          description: Rating submitted
  /api/v1/reports/:
    get:
      operationId: v1_reports_retrieve
      tags:
      - v1
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_reports_create
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/reports/{report_id}/:
    get:
      operationId: v1_reports_retrieve_2
      parameters:
      - in: path
        name: report_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/reports/{report_id}/actions/:
    post:
      operationId: v1_reports_actions_create
      parameters:
      - in: path
        name: report_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/reports/{report_id}/attachments/:
    get:
      operationId: v1_reports_attachments_retrieve
      parameters:
      - in: path
        name: report_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_reports_attachments_create
      parameters:
      - in: path
        name: report_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/units/:
    get:
      operationId: v1_units_retrieve
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/users/:
    get:
      operationId: v1_users_retrieve
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/users/{user_id}/:
    get:
      operationId: v1_users_retrieve_2
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/users/{user_id}/delete/:
    delete:
      operationId: v1_users_delete_destroy
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      responses:
        '204':
          description: No response body
  /api/v1/users/{user_id}/update/:
    put:
      operationId: v1_users_update_update
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      responses:
        '200':
          description: No response body
  /api/v1/users/create/:
    post:
      operationId: v1_users_create_create
      tags:
      - v1
      responses:
        '200':
          description: No response body
components:
  schemas:
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
