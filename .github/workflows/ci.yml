name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hrmm_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black
      - name: Lint
        run: |
          flake8 apps config
          black --check apps config
      - name: Run tests
        run: |
          python manage.py test apps --settings=config.settings.test_sqlite

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hrmm_frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run format:check
