name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hrmm_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black bandit pip-audit
      - name: Lint
        run: |
          flake8 apps config
          black --check apps config
      - name: SAST (Bandit)
        run: bandit -r apps config -ll
      - name: SCA (pip-audit)
        run: pip-audit --strict
      - name: Run tests
        run: |
          python manage.py test apps --settings=config.settings.test_sqlite

  security-scanning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hrmm_frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npx --yes eslint app.js src
      - name: Check formatting
        run: npx --yes prettier --check app.js src
      - name: SCA (npm audit)
        run: npm audit --audit-level=moderate
