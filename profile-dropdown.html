<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil Dropdown</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
      :root {
        --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --color-background: #f8fafc;
        --color-background-secondary: #ffffff;
        --color-background-info: #e7f5ff;
        --color-background-danger: #fff1f2;
        --color-border-tertiary: #d6d6df;
        --color-border-info: #7cc4ff;
        --color-border-danger: #f4a0a9;
        --color-text: #111827;
        --color-text-muted: #6b7280;
        --color-text-info: #1d9e75;
        --color-text-danger: #c92a2a;
        --border-radius-lg: 12px;
        --border-radius-md: 8px;
        --transition-fast: 0.15s ease;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-background: #111827;
          --color-background-secondary: #1f2937;
          --color-background-info: #0f766e;
          --color-background-danger: #831843;
          --color-border-tertiary: #374151;
          --color-border-info: #38bdf8;
          --color-border-danger: #f87171;
          --color-text: #f8fafc;
          --color-text-muted: #9ca3af;
          --color-text-info: #7dd3fc;
          --color-text-danger: #fca5a5;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
        padding: 2rem;
        font-family: var(--font-sans);
        background: var(--color-background);
        color: var(--color-text);
      }

      .dropdown-card {
        width: 280px;
        border: 0.5px solid var(--color-border-tertiary);
        border-radius: var(--border-radius-lg);
        background: var(--color-background-secondary);
        overflow: hidden;
      }

      .toggle-row {
        width: 100%;
        border: none;
        background: transparent;
        padding: 1rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        cursor: pointer;
      }

      .toggle-row:hover {
        background: var(--color-background-secondary);
      }

      .row-left,
      .row-right {
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 24px;
      }

      .row-left i,
      .row-right i {
        font-size: 18px;
      }

      .row-label {
        flex: 1;
        text-align: left;
        font-size: 14px;
        font-weight: 600;
      }

      .toggle-row-open .row-right i {
        transform: rotate(90deg);
        transition: transform 0.3s ease;
      }

      .row-right i {
        transition: transform 0.3s ease;
      }

      .profile-info-panel {
        padding: 1rem 1rem 0;
        display: none;
        gap: 0.75rem;
        align-items: center;
      }

      .profile-info-panel.active {
        display: flex;
      }

      .profile-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--color-background-info);
        color: var(--color-text-info);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 16px;
        flex-shrink: 0;
      }

      .profile-info-body {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .profile-info-name {
        margin: 0;
        font-size: 15px;
        font-weight: 500;
      }

      .profile-info-role {
        margin: 0;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--color-text-info);
      }

      .expandable-panel {
        overflow: hidden;
        max-height: 0;
        transition: max-height 0.35s ease;
      }

      .expandable-panel.open {
        max-height: 700px;
      }

      .section {
        border-top: 0.5px solid var(--color-border-tertiary);
        padding: 0.85rem 1rem;
      }

      .status-section {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 13px;
        font-weight: 500;
        border-bottom: 0.5px solid var(--color-border-tertiary);
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #1d9e75;
        flex-shrink: 0;
      }

      .actions-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.75rem;
      }

      .action-button,
      .icon-button,
      .help-button {
        border-radius: var(--border-radius-md);
        border: 0.5px solid var(--color-border-tertiary);
        background: var(--color-background-secondary);
        color: var(--color-text);
        transition: background var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast);
        cursor: pointer;
      }

      .action-button {
        padding: 0.75rem 0.85rem;
        font-size: 12px;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .action-button:hover {
        background: var(--color-background-secondary);
      }

      .refresh-button:hover {
        background: var(--color-background-info);
        border-color: var(--color-border-info);
        color: var(--color-text-info);
      }

      .logout-button:hover {
        background: var(--color-background-danger);
        border-color: var(--color-border-danger);
        color: var(--color-text-danger);
      }

      .icon-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 0.5rem;
        padding: 0.75rem 1rem 0.75rem;
      }

      .icon-action {
        border: none;
        background: transparent;
        color: var(--color-text);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
        padding: 0.65rem 0.35rem;
        border-radius: var(--border-radius-md);
        transition: background var(--transition-fast), color var(--transition-fast);
        font-size: 12px;
      }

      .icon-action:hover {
        background: var(--color-background-secondary);
      }

      .icon-action.active {
        color: var(--color-text-info);
      }

      .icon-action i {
        font-size: 20px;
      }

      .icon-action-label {
        line-height: 1.2;
      }

      .help-button {
        width: calc(100% - 2.5rem);
        margin: 0.75rem 1.25rem 1rem;
        padding: 0.85rem 0.95rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .help-content {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.2rem;
        flex: 1;
        min-width: 0;
      }

      .help-title {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
      }

      .help-subtitle {
        margin: 0;
        font-size: 11px;
        color: var(--color-text-muted);
        transition: color var(--transition-fast);
      }

      .help-button:hover {
        background: var(--color-background-info);
        border-color: var(--color-border-info);
        color: var(--color-text-info);
      }

      .help-button:hover .help-subtitle {
        color: rgba(29, 158, 117, 0.75);
      }

      .help-button i {
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="dropdown-card" id="profileDropdown">
      <button class="toggle-row" id="toggleRow" type="button">
        <span class="row-left"><i class="ti ti-user-circle"></i></span>
        <span class="row-label">Profil</span>
        <span class="row-right"><i class="ti ti-chevron-right"></i></span>
      </button>

      <div class="profile-info-panel" id="profileInfoPanel">
        <div class="profile-avatar">MM</div>
        <div class="profile-info-body">
          <p class="profile-info-name">Mamaniyozov Muhammadyusuf</p>
          <p class="profile-info-role">DIRECTOR</p>
        </div>
      </div>

      <div class="expandable-panel" id="expandablePanel">
        <div class="section status-section">
          <span class="status-dot"></span>
          <span>Online</span>
        </div>

        <div class="section actions-row">
          <button class="action-button refresh-button" id="refreshBtn" type="button">
            <i class="ti ti-refresh"></i>
            Yangilash
          </button>
          <button class="action-button logout-button" id="logoutBtn" type="button">
            <i class="ti ti-logout"></i>
            Chiqish
          </button>
        </div>

        <div class="icon-grid">
          <button class="icon-action" id="infoToggle" type="button">
            <i class="ti ti-id-badge"></i>
            <span class="icon-action-label">Ma'lumot</span>
          </button>
          <button class="icon-action" type="button">
            <i class="ti ti-calendar"></i>
            <span class="icon-action-label">Taqvim</span>
          </button>
          <button class="icon-action" type="button">
            <i class="ti ti-layout-list"></i>
            <span class="icon-action-label">Menyu</span>
          </button>
          <button class="icon-action" type="button">
            <i class="ti ti-wifi"></i>
            <span class="icon-action-label">Ulanish</span>
          </button>
          <button class="icon-action" type="button">
            <i class="ti ti-user-plus"></i>
            <span class="icon-action-label">User qo'sh</span>
          </button>
        </div>

        <button class="help-button" type="button">
          <i class="ti ti-lifebuoy" style="font-size:18px;"></i>
          <span class="help-content">
            <span class="help-title">Yordam markaziga ulanish</span>
            <span class="help-subtitle">Texnik qo'llab-quvvatlash</span>
          </span>
          <i class="ti ti-chevron-right"></i>
        </button>
      </div>
    </div>

    <script>
      const toggleRow = document.getElementById("toggleRow");
      const expandablePanel = document.getElementById("expandablePanel");
      const profileInfoPanel = document.getElementById("profileInfoPanel");
      const infoToggle = document.getElementById("infoToggle");

      let panelOpen = false;
      let profileInfoOpen = false;

      function updatePanelState() {
        if (panelOpen) {
          expandablePanel.classList.add("open");
          toggleRow.classList.add("toggle-row-open");
          if (profileInfoOpen) {
            profileInfoPanel.classList.add("active");
            infoToggle.classList.add("active");
          } else {
            profileInfoPanel.classList.remove("active");
            infoToggle.classList.remove("active");
          }
        } else {
          expandablePanel.classList.remove("open");
          toggleRow.classList.remove("toggle-row-open");
          profileInfoPanel.classList.remove("active");
          profileInfoOpen = false;
          infoToggle.classList.remove("active");
        }
      }

      toggleRow.addEventListener("click", () => {
        panelOpen = !panelOpen;
        updatePanelState();
      });

      infoToggle.addEventListener("click", () => {
        if (!panelOpen) {
          panelOpen = true;
        }
        profileInfoOpen = !profileInfoOpen;
        updatePanelState();
      });

      document.getElementById("refreshBtn").addEventListener("click", () => {
        window.location.reload();
      });

      document.getElementById("logoutBtn").addEventListener("click", () => {
        alert("Chiqish bosildi.");
      });
    </script>
  </body>
</html>
