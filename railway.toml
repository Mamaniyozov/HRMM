[build]
builder = "nixpacks"
buildCommand = "cd hrmm_backend && pip install -r requirements.txt"

[deploy]
startCommand = "cd hrmm_backend && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py shell -c \"from django.contrib.auth import get_user_model; from apps.users.models import User as AppUser; Admin=get_user_model(); Admin.objects.filter(username='admin').exists() or Admin.objects.create_superuser('admin','admin@example.com','admin123'); AppUser.objects.filter(username='admin').exists() or AppUser.objects.create(username='admin', email='admin@example.com', full_name='System Admin', password_hash='admin123', role='DIRECTOR', is_active=True)\" && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
